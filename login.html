<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f2f5;
      font-family: system-ui, sans-serif;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.10);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 1.75rem;
      color: #111;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      margin-bottom: 1.1rem;
    }

    label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #444;
    }

    input {
      padding: 0.65rem 0.85rem;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }

    input:focus { border-color: #4f46e5; }
    input.error { border-color: #e53e3e; }

    .password-wrapper {
      position: relative;
    }

    .password-wrapper input {
      padding-right: 2.8rem;
    }

    .toggle-pw {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #888;
      font-size: 0.85rem;
      padding: 0;
    }

    .message {
      display: none;
      padding: 0.65rem 0.85rem;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }

    .message.error { background: #fff5f5; color: #c53030; border: 1px solid #fed7d7; display: block; }
    .message.success { background: #f0fff4; color: #276749; border: 1px solid #c6f6d5; display: block; }

    button[type="submit"] {
      width: 100%;
      padding: 0.75rem;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.15s;
    }

    button[type="submit"]:hover { background: #4338ca; }
    button[type="submit"]:disabled { background: #a5b4fc; cursor: not-allowed; }

    .footer {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.875rem;
      color: #666;
    }

    .footer a {
      color: #4f46e5;
      text-decoration: none;
      font-weight: 600;
    }

    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Login</h1>

    <div id="msg" class="message"></div>

    <form id="loginform" novalidate>
      <div class="field">
        <label for="email">E-Mail</label>
        <input type="email" id="email" placeholder="name@beispiel.ch" required />
      </div>

      <div class="field">
        <label for="password">Passwort</label>
        <div class="password-wrapper">
          <input type="password" id="password" placeholder="••••••••" required />
          <button type="button" class="toggle-pw" id="togglePw">Zeigen</button>
        </div>
      </div>

      <button type="submit" id="submitBtn">Einloggen</button>
    </form>

    <div class="footer">
      Noch kein Konto? <a href="register.html">Registrieren</a>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
