<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baby Sleep Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #070d1f;
      color: #f0f4ff;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 2rem 1.5rem;
    }

    .logo {
      width: 88px;
      height: 88px;
      background: #1e2340;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.75rem;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.07), 0 8px 32px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 0.6rem;
    }

    p {
      color: #7888aa;
      font-size: 1rem;
      text-align: center;
      max-width: 280px;
      line-height: 1.5;
      margin-bottom: 2.5rem;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      background: #4f46e5;
      color: #f0f4ff;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      padding: 0.9rem 2rem;
      border-radius: 14px;
      transition: background 0.15s, transform 0.1s;
    }

    .btn:hover  { background: #4338ca; }
    .btn:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="logo">
    <svg width="44" height="44" viewBox="0 0 24 24" fill="none">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" fill="#818cf8"/>
    </svg>
  </div>

  <h1>Baby Sleep Assistant</h1>
  <p>Monitor your baby's sleep environment in real time.</p>

  <a href="login.html" class="btn">
    Open App
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 12h14M12 5l7 7-7 7"/>
    </svg>
  </a>
</body>
</html>
