<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>History</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #070d1f;
      color: #f0f4ff;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 1.75rem 1.25rem 2rem;
      max-width: 480px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.75rem;
    }

    .back-btn {
      width: 40px; height: 40px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #f0f4ff;
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .back-btn:hover { background: rgba(255,255,255,0.14); }

    .topbar h1 { font-size: 1.5rem; font-weight: 700; }
    .topbar p  { font-size: 0.85rem; color: #7888aa; margin-top: 0.2rem; }

    .range-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .range-tab {
      flex: 1;
      padding: 0.5rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      color: #7888aa;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s, color 0.15s;
    }

    .range-tab.active {
      background: #4f46e5;
      border-color: #4f46e5;
      color: #f0f4ff;
    }

    .card {
      background: #0d1730;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 18px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .chart-wrap { height: 220px; }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.75rem;
      margin-top: 1rem;
    }

    .stat-box {
      background: rgba(255,255,255,0.04);
      border-radius: 12px;
      padding: 0.75rem;
      text-align: center;
    }

    .stat-label { font-size: 0.75rem; color: #7888aa; margin-bottom: 0.25rem; }
    .stat-value { font-size: 1.2rem; font-weight: 700; }

    .loading {
      text-align: center;
      color: #7888aa;
      padding: 3rem 1rem;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <button class="back-btn" onclick="history.back()">‹</button>
    <div>
      <h1 id="page-title">History</h1>
      <p id="page-sub">All recorded values</p>
    </div>
  </div>

  <div class="range-tabs">
    <div class="range-tab active" data-days="7">7 days</div>
    <div class="range-tab" data-days="30">30 days</div>
    <div class="range-tab" data-days="90">90 days</div>
    <div class="range-tab" data-days="365">1 year</div>
  </div>

  <div class="card">
    <div class="chart-wrap">
      <canvas id="main-chart"></canvas>
    </div>
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-label">Min</div>
        <div class="stat-value" id="stat-min">—</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Avg</div>
        <div class="stat-value" id="stat-avg">—</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Max</div>
        <div class="stat-value" id="stat-max">—</div>
      </div>
    </div>
  </div>

  <script src="js/history.js"></script>
</body>
</html>
